<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinklePad-Result Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div id="navbar-container">
        <div class="navbar-title">TinklePad</div>
        <div class="navbar-option">
            <ul class="navbar-button">
                <li>Dashboard</li>
                <li>Quiz</li>
                <li>Results</li>
                <li>Leaderboard</li>
            </ul>
        </div>
        <div class="navbar-features">
            <div class="features">
                <ul class="navbar-info">
                    <li>Home</li>
                    <li>About Us</li>
                    <li>Contact</li>
                </ul>
            </div>
        </div>
    </div>
    <div class="result-board">
        <div id="result-slide">
            <div class="question-result">
                <div class="question-title">Question Name</div>
                <div class="final-result">Correct</div>
                <div class="explanation">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Exercitationem, veritatis.</div> 
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="result.js"></script>
</body>
</html>
