<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinklePad - A Solo Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-container">
        <div class="navbar-title">TinklePad</div>
        <div class="navbar-option">
            <ul class="navbar-button">
                <li>Dashboard</li>
                <li>Quiz</li>
                <li>Results</li>
                <li>Leaderboard</li>
            </ul>
        </div>
        <div class="navbar-features">
            <div class="features">
                <ul class="navbar-info">
                    <li>Home</li>
                    <li>About Us</li>
                    <li>Contact</li>
                </ul>
            </div>
        </div>
    </div>
    <main>
        <div id="dashboard">
            <div class="dashboard-heading">TinklePad Dashboard</div>
            <span class="dashboard-decorator"></span>
            <div class="category">
                <label class="label" for="category">Category</label>
                <select name="category" id="category" class="select">
                    <option value="Programming">Programming</option>
                    <option value="DevOps">DevOps</option>
                    <option value="History">History</option>
                    <option value="Geography">Geography</option>
                </select>
            </div>
            <div class="difficulty">
                <label class="label" for="difficulty">Difficulty</label>
                <select name="difficulty" id="difficulty" class="select">
                    <option value="EASY">Easy</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HARD">Hard</option>
                </select>
            </div>
            <div class="questions">
                <label class="label" for="questions">Number of Questions</label>
                <select name="questions" id="questions" class="select" onchange="numberOfQuestions()"">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                </select>
            </div>
            <div class="info-box">
                <p>You will get 5 questions. <br/> Single And Multiple Choice</p>
            </div>
            <div class="start-quiz-button">
                <button onclick="startQuiz()"; onclick="showPanel();">Start Quiz</button>
            </div>
        </div>
    </main>
    <main>
                <div id="quiz-interface">
            <div id="quiz-page">
                
                </div>
            </div>
            </div>
        <div id="info-board">
            <div id="question-timer">00:00</div>
            <div class="stats-board board">
                <div class="quiz-stats">
                    <div class="up">
                        <div class="score block">
                        <div class="box">Score</div>
                        <div id="score-val" class="value">0</div>
                    </div>
                    <div class="count block">
                        <div class="box">Count</div>
                        <div id="count-val" class="value">10</div>
                    </div>
                    </div>
                    <div class="down">
                    <div class="correct block">
                        <div class="box down">Correct</div>
                        <div class="value">+4</div>
                    </div>
                    <div class="wrong block">
                        <div class="box down">Wrong</div>
                        <div class="value">0</div>
                    </div>
                    </div>
                </div>
            </div>
            <div class="question-board board">
            </div>
             <div id="quiz-completion">0% completed</div>
                <div id="quiz-progress">
                    <div id="completion-progress"></div>
                </div>
            <div class="submit-and-leave">
                <button id="submit-and-leave">SHOW RESULTS</button>
            </div>
        </div>
        </div>
    </main>
    <footer>
        <div id="result-dashboard">
        <p>Result Dashboard</p>
        <div id="final-score">
            <p>Score - 100%</p>
        </div>
        <div id="celebration-message">
            <p>Nice Work!</p>
        </div>
    </div>
    </footer>
    <script src="script.js"></script>
    <script>
        function numberOfQuestions(){
            document.getElementsByClassName('info-box')[0].innerHTML = ` <p>You will get ${questions.value} questions. <br/> Single And Multiple Choice</p>`
        }
    </script>
</body>
</html>
